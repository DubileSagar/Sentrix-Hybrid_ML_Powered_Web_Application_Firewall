apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: sentrix-waf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: gcr.io/PROJECT/demo-app:latest
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: sentrix-waf
spec:
  selector:
    app: demo
  ports:
  - protocol: TCP
    port: 5001
    targetPort: 5001
  type: ClusterIP
