apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentrix-dashboard
  namespace: sentrix-waf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: gcr.io/PROJECT/dashboard:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: sentrix-waf
spec:
  selector:
    app: dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
  type: LoadBalancer
